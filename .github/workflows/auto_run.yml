name: LME Copper Auto Scraper

on:
  schedule:
    # 毎日日本時間の朝9時（UTC時間では前日の24:00）に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 1. 最新のv4に変更（Node.jsの警告を消すため）
    - name: コードをチェックアウト
      uses: actions/checkout@v4

    # 2. 最新のv5に変更（Node.jsの警告を消すため）
    - name: Pythonの準備
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要な道具（ライブラリ）のインストール
      run: |
        pip install requests beautifulsoup4 pandas

    - name: Pythonプログラムの実行
      run: python you.py  # ※アップロードしたPythonファイル名と完全に一致させてください

    - name: 新しくできたCSVファイルをGitHubに保存するおまじない
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # 念のためファイルが存在することを確認してから追加する設定にしています
        if [ -f lme_copper_1month.csv ]; then
          git add lme_copper_1month.csv
          git commit -m "最新の銅相場データを更新" || exit 0
          git push
        else
          echo "エラー: CSVファイルが生成されていません。"
          exit 1
        fi
